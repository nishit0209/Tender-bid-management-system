{% load static %}
<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Page Not Found | TenderBMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>* { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="h-full bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 flex items-center justify-center p-6">

    <div class="absolute inset-0 overflow-hidden pointer-events-none">
        <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-indigo-600/5 rounded-full blur-3xl"></div>
        <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-purple-600/5 rounded-full blur-3xl"></div>
    </div>

    <div class="relative text-center max-w-lg">
        <!-- Logo -->
        <div class="flex flex-col items-center justify-center gap-1.5 mb-10">
            <img src="{% static 'images/logo-1-removebg-preview.png' %}" alt="TenderBMS Logo" class="w-48 h-auto object-contain">
            <p class="text-[10px] uppercase tracking-wider font-semibold text-slate-600 dark:text-slate-400">Procurement System</p>
        </div>

        <!-- 404 -->
        <div class="mb-6">
            <p class="text-8xl font-black bg-gradient-to-r from-indigo-400 to-cyan-400 bg-clip-text text-transparent leading-none">404</p>
        </div>

        <h1 class="text-2xl font-bold text-slate-900 dark:text-white mb-3">Page Not Found</h1>
        <p class="text-slate-600 dark:text-slate-400 text-sm leading-relaxed mb-8">
            The page you're looking for doesn't exist or has been moved.<br>
            Please check the URL or navigate back to the dashboard.
        </p>

        <div class="flex items-center justify-center gap-3 flex-wrap">
            <a href="/"
               class="flex items-center gap-2 px-5 py-2.5 bg-indigo-600 hover:bg-indigo-500 text-white font-medium rounded-xl transition-all text-sm shadow-lg shadow-indigo-500/20">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
                </svg>
                Go to Dashboard
            </a>
            <a href="javascript:history.back()"
               class="flex items-center gap-2 px-5 py-2.5 bg-slate-50 dark:bg-slate-800 hover:bg-slate-100 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-300 font-medium rounded-xl border border-slate-300 dark:border-slate-700 transition-all text-sm">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
                </svg>
                Go Back
            </a>
        </div>
    </div>
</body>
</html>
